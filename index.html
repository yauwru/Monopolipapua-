<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Papua Pro Online - Animated Edition</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #09090b; color: white; margin: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* Board Styles */
        .board-grid { display: grid; grid-template-columns: repeat(11, 1fr); grid-template-rows: repeat(11, 1fr); aspect-ratio: 1/1; width: 100%; max-width: 650px; margin: auto; background: #18181b; border: 4px solid #27272a; position: relative; }
        .tile { border: 0.1px solid #3f3f46; position: relative; background: white; color: #18181b; display: flex; flex-direction: column; overflow: hidden; font-size: 0.5rem; font-weight: 800; text-align: center; }
        .tile-header { height: 20%; width: 100%; border-bottom: 1px solid #000; }
        
        /* Pion Animation */
        .token { 
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
            z-index: 50; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        /* Honai Animation */
        .house-indicator { display: flex; justify-content: center; gap: 2px; position: absolute; top: 22%; width: 100%; }
        .house-dot { 
            width: 6px; height: 6px; background: #22c55e; border-radius: 50%; 
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Dice Animation */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .rolling { animation: shake 0.2s infinite; }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .screen-fade { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .money-flash-plus { color: #22c55e; animation: flash 1s ease-out; }
        .money-flash-minus { color: #ef4444; animation: flash 1s ease-out; }
        @keyframes flash { 0% { opacity: 0; transform: translateY(0); } 50% { opacity: 1; } 100% { opacity: 0; transform: translateY(-20px); } }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPSs5fJjfbWvFlYMjZqrG4eZAstvKsHgg",
            authDomain: "polipa-30a84.firebaseapp.com",
            projectId: "polipa-30a84",
            storageBucket: "polipa-30a84.firebasestorage.app",
            messagingSenderId: "305278736815",
            appId: "1:305278736815:web:133040b603d90e005c775a",
            measurementId: "G-YHN6TEBTGJ"
        };

        const app = initializeApp(firebaseConfig);
        window.FB = { auth: getAuth(app), db: getFirestore(app), doc, setDoc, onSnapshot, updateDoc, getDoc, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TILES_DATA = [
            { name: "MULAI", type: "start", price: 0 },
            { name: "Raja Ampat", type: "prop", color: "#78350f", price: 600000, rent: [40000, 200000, 600000, 1800000], build: 500000 },
            { name: "Suara Rakyat", type: "event" },
            { name: "Danau Sentani", type: "prop", color: "#78350f", price: 600000, rent: [40000, 200000, 600000, 1800000], build: 500000 },
            { name: "Pajak Masuk", type: "tax", price: 2000000 },
            { name: "Bandara Sentani", type: "airport", price: 2000000 },
            { name: "Biak Kota", type: "prop", color: "#0ea5e9", price: 1000000, rent: [60000, 300000, 900000, 2700000], build: 500000 },
            { name: "Peluang", type: "event" },
            { name: "Supiori", type: "prop", color: "#0ea5e9", price: 1000000, rent: [60000, 300000, 900000, 2700000], build: 500000 },
            { name: "Yapen", type: "prop", color: "#0ea5e9", price: 1200000, rent: [80000, 400000, 1200000, 3000000], build: 500000 },
            { name: "PENJARA", type: "jail" },
            { name: "Wamena", type: "prop", color: "#d946ef", price: 1400000, rent: [100000, 500000, 1500000, 4500000], build: 1000000 },
            { name: "PLN", type: "util", price: 1500000 },
            { name: "Baliem", type: "prop", color: "#d946ef", price: 1400000, rent: [100000, 500000, 1500000, 4500000], build: 1000000 },
            { name: "Puncak Jaya", type: "prop", color: "#d946ef", price: 1600000, rent: [120000, 600000, 1800000, 5000000], build: 1000000 },
            { name: "Pelabuhan Jayapura", type: "port", price: 2000000 },
            { name: "Timika", type: "prop", color: "#f97316", price: 1800000, rent: [140000, 700000, 2000000, 5500000], build: 1000000 },
            { name: "Suara Rakyat", type: "event" },
            { name: "Tembagapura", type: "prop", color: "#f97316", price: 1800000, rent: [140000, 700000, 2000000, 5500000], build: 1000000 },
            { name: "Asmat", type: "prop", color: "#f97316", price: 2000000, rent: [160000, 800000, 2200000, 6000000], build: 1000000 },
            { name: "PARKIR BEBAS", type: "park" },
            { name: "Manokwari", type: "prop", color: "#ef4444", price: 2200000, rent: [180000, 900000, 2500000, 7000000], build: 1500000 },
            { name: "Peluang", type: "event" },
            { name: "Wondama", type: "prop", color: "#ef4444", price: 2200000, rent: [180000, 900000, 2500000, 7000000], build: 1500000 },
            { name: "Fakfak", type: "prop", color: "#ef4444", price: 2400000, rent: [200000, 1000000, 3000000, 7500000], build: 1500000 },
            { name: "Bandara Mopah", type: "airport", price: 2000000 },
            { name: "Merauke", type: "prop", color: "#eab308", price: 2600000, rent: [220000, 1100000, 3300000, 8000000], build: 1500000 },
            { name: "Boven Digoel", type: "prop", color: "#eab308", price: 2600000, rent: [220000, 1100000, 3300000, 8000000], build: 1500000 },
            { name: "PAM", type: "util", price: 1500000 },
            { name: "Tanah Merah", type: "prop", color: "#eab308", price: 2800000, rent: [240000, 1200000, 3600000, 8500000], build: 1500000 },
            { name: "MASUK PENJARA", type: "gotojail" },
            { name: "Sorong Kota", type: "prop", color: "#16a34a", price: 3000000, rent: [260000, 1300000, 3900000, 9000000], build: 2000000 },
            { name: "Raja Ampat 2", type: "prop", color: "#16a34a", price: 3000000, rent: [260000, 1300000, 3900000, 9000000], build: 2000000 },
            { name: "Suara Rakyat", type: "event" },
            { name: "Piaynemo", type: "prop", color: "#16a34a", price: 3200000, rent: [280000, 1500000, 4500000, 10000000], build: 2000000 },
            { name: "Pelabuhan Sorong", type: "port", price: 2000000 },
            { name: "Peluang", type: "event" },
            { name: "Jayapura", type: "prop", color: "#2563eb", price: 3500000, rent: [350000, 1750000, 5000000, 11000000], build: 2000000 },
            { name: "Denda Adat", type: "tax", price: 3000000 },
            { name: "Puncak Jayapura", type: "prop", color: "#2563eb", price: 4000000, rent: [500000, 2000000, 6000000, 13000000], build: 2000000 }
        ];

        const TOKENS = ["🦜", "🐊", "🛶", "🐍", "🦘"];

        function App() {
            const [user, setUser] = useState(null);
            const [roomID, setRoomID] = useState("");
            const [playerName, setPlayerName] = useState("");
            const [selectedToken, setSelectedToken] = useState(TOKENS[0]);
            const [gameState, setGameState] = useState(null);
            const [screen, setScreen] = useState('landing');
            const [isRolling, setIsRolling] = useState(false);
            const [localPos, setLocalPos] = useState({}); // Tracking visual position separate from DB

            useEffect(() => {
                if (!window.FB) return;
                const { auth, signInAnonymously, onAuthStateChanged } = window.FB;
                onAuthStateChanged(auth, u => setUser(u || null));
                if (!auth.currentUser) signInAnonymously(auth);
            }, []);

            useEffect(() => {
                if (!roomID || !user || !window.FB) return;
                const { db, doc, onSnapshot } = window.FB;
                return onSnapshot(doc(db, "rooms", roomID), snap => {
                    if (snap.exists()) {
                        const data = snap.data();
                        setGameState(data);
                        if (data.status === 'playing') setScreen('game');
                        
                        // Sync local visual position with DB
                        const newLocalPos = {};
                        data.players.forEach(p => { newLocalPos[p.uid] = p.pos; });
                        setLocalPos(newLocalPos);
                    }
                });
            }, [roomID, user]);

            const joinRoom = async (role) => {
                if (!playerName) return alert("Nama wajib diisi!");
                const targetRoom = role === 'host' ? "P-" + Math.floor(1000 + Math.random() * 9000) : roomID;
                if (!targetRoom) return alert("Masukkan Kode Room!");

                const { db, doc, getDoc, setDoc } = window.FB;
                const docRef = doc(db, "rooms", targetRoom);
                const snap = await getDoc(docRef);
                
                let data = snap.exists() ? snap.data() : { 
                    players: [], status: 'waiting', turn: 0, dice: [1, 1], logs: ["Sio Mama, mari main!"], props: {} 
                };

                if (data.players.length >= 4) return alert("Room Penuh!");
                if (!data.players.find(p => p.uid === user.uid)) {
                    data.players.push({ uid: user.uid, name: playerName, token: selectedToken, money: 15000000, pos: 0, color: `hsl(${Math.random()*360}, 70%, 50%)`, isHost: role === 'host', inJail: 0 });
                    data.logs.push(`${playerName} masuk ke tanah Papua.`);
                }
                setRoomID(targetRoom);
                await setDoc(docRef, data);
                setScreen('lobby');
            };

            const rollDice = async () => {
                if (isRolling) return;
                const myIdx = gameState.players.findIndex(p => p.uid === user.uid);
                if (gameState.turn !== myIdx) return;

                setIsRolling(true);
                const d1 = Math.floor(Math.random()*6)+1;
                const d2 = Math.floor(Math.random()*6)+1;
                const total = d1 + d2;

                // Visual Animation on local UI before DB sync
                let currentStep = 0;
                const interval = setInterval(() => {
                    setLocalPos(prev => ({ ...prev, [user.uid]: (prev[user.uid] + 1) % 40 }));
                    currentStep++;
                    if (currentStep >= total) {
                        clearInterval(interval);
                        finishTurn(d1, d2, total);
                    }
                }, 150);
            };

            const finishTurn = async (d1, d2, total) => {
                const myIdx = gameState.players.findIndex(p => p.uid === user.uid);
                let players = [...gameState.players];
                let props = { ...gameState.props };
                let logs = [...gameState.logs].slice(-12);
                let cur = players[myIdx];

                const oldPos = cur.pos;
                cur.pos = (cur.pos + total) % 40;
                if (cur.pos < oldPos) { cur.money += 2000000; logs.push(`${cur.name} terima gaji Rp2jt`); }

                const tile = TILES_DATA[cur.pos];
                logs.push(`${cur.name} tiba di ${tile.name}`);

                // Realism Rules
                if (tile.type === 'tax') { cur.money -= tile.price; logs.push(`${cur.name} denda pajak Rp${tile.price/1000}k`); }
                if (tile.type === 'gotojail') { cur.pos = 10; cur.inJail = 3; logs.push(`${cur.name} masuk penjara adat!`); }
                
                // Rent Automatic
                const prop = props[cur.pos];
                if (prop && prop.owner !== user.uid) {
                    const ownerIdx = players.findIndex(p => p.uid === prop.owner);
                    const rent = tile.type === 'prop' ? tile.rent[prop.houses] : 500000;
                    cur.money -= rent;
                    players[ownerIdx].money += rent;
                    logs.push(`Bayar sewa Rp${rent/1000}k ke ${players[ownerIdx].name}`);
                }

                await window.FB.updateDoc(window.FB.doc(window.FB.db, "rooms", roomID), { 
                    dice: [d1, d2], players, logs, turn: (gameState.turn + 1) % players.length 
                });
                setIsRolling(false);
            };

            const handleAction = async (type) => {
                const myIdx = gameState.players.findIndex(p => p.uid === user.uid);
                let players = [...gameState.players];
                let props = { ...gameState.props };
                const pos = players[myIdx].pos;
                const tile = TILES_DATA[pos];

                if (type === 'buy' && players[myIdx].money >= tile.price) {
                    players[myIdx].money -= tile.price;
                    props[pos] = { owner: user.uid, houses: 0 };
                    await window.FB.updateDoc(window.FB.doc(window.FB.db, "rooms", roomID), { 
                        players, props, logs: [...gameState.logs, `${players[myIdx].name} beli ${tile.name}`] 
                    });
                } else if (type === 'build' && players[myIdx].money >= tile.build && props[pos]?.houses < 3) {
                    players[myIdx].money -= tile.build;
                    props[pos].houses += 1;
                    await window.FB.updateDoc(window.FB.doc(window.FB.db, "rooms", roomID), { 
                        players, props, logs: [...gameState.logs, `${players[myIdx].name} bangun Honai di ${tile.name}`] 
                    });
                }
            };

            const getCoord = (i) => {
                const c = [[11,11],[11,10],[11,9],[11,8],[11,7],[11,6],[11,5],[11,4],[11,3],[11,2],[11,1],[10,1],[9,1],[8,1],[7,1],[6,1],[5,1],[4,1],[3,1],[2,1],[1,1],[1,2],[1,3],[1,4],[1,5],[1,6],[1,7],[1,8],[1,9],[1,10],[1,11],[2,11],[3,11],[4,11],[5,11],[6,11],[7,11],[8,11],[9,11],[10,11]];
                return { r: c[i][0], c: c[i][1] };
            };

            // --- Views ---
            if (screen === 'landing') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 space-y-12 screen-fade">
                    <div className="text-center">
                        <h1 className="text-8xl font-black text-orange-500 italic tracking-tighter drop-shadow-2xl">PAPUA</h1>
                        <p className="tracking-[0.5em] text-zinc-500 text-xs mt-2 font-bold opacity-50 uppercase">Pro Multiplayer Online</p>
                    </div>
                    <div className="w-full max-w-sm space-y-6">
                        <input className="w-full bg-zinc-900 border-2 border-zinc-800 p-5 rounded-3xl text-white outline-none focus:border-orange-500 transition-all" placeholder="Nama Pace / Mace" value={playerName} onChange={e=>setPlayerName(e.target.value)} />
                        <div className="flex justify-between bg-zinc-900 p-4 rounded-3xl border border-zinc-800">
                            {TOKENS.map(t => <button key={t} onClick={()=>setSelectedToken(t)} className={`text-3xl p-3 rounded-2xl transition-all transform hover:scale-110 ${selectedToken===t?'bg-orange-500 shadow-xl':'opacity-30'}`}>{t}</button>)}
                        </div>
                        <div className="flex gap-4">
                            <button onClick={()=>joinRoom('host')} className="flex-1 bg-orange-600 py-5 rounded-3xl font-black shadow-xl transform active:scale-95 transition-all">HOST GAME</button>
                            <button onClick={()=>setScreen('join')} className="flex-1 bg-zinc-800 py-5 rounded-3xl font-black transform active:scale-95 transition-all">GABUNG</button>
                        </div>
                    </div>
                </div>
            );

            if (screen === 'join') return (
                <div className="min-h-screen flex items-center justify-center p-6 screen-fade">
                    <div className="bg-zinc-900 p-10 rounded-[2.5rem] w-full max-w-sm text-center space-y-8 border border-zinc-800 shadow-2xl">
                        <h2 className="font-bold text-zinc-400 uppercase tracking-widest text-xs">MASUKKAN KODE</h2>
                        <input className="w-full bg-zinc-800 p-6 rounded-2xl text-4xl font-black text-center tracking-widest outline-none border border-zinc-700" placeholder="P-XXXX" value={roomID} onChange={e=>setRoomID(e.target.value.toUpperCase())} />
                        <button onClick={()=>joinRoom('client')} className="w-full bg-orange-600 py-5 rounded-2xl font-black text-xl shadow-lg">GABUNG SEKARANG</button>
                        <button onClick={()=>setScreen('landing')} className="text-zinc-500 text-sm hover:text-white">Kembali</button>
                    </div>
                </div>
            );

            if (screen === 'lobby') return (
                <div className="min-h-screen flex items-center justify-center p-6 screen-fade">
                    <div className="bg-zinc-900 p-10 rounded-[3rem] w-full max-w-md space-y-8 border border-zinc-800 shadow-2xl">
                        <div className="text-center space-y-2">
                            <p className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Bagikan Kode Ini</p>
                            <p className="text-5xl font-black text-orange-500 tracking-widest">{roomID}</p>
                        </div>
                        <div className="space-y-3">
                            {gameState?.players.map(p => (
                                <div key={p.uid} className="bg-zinc-800/50 p-5 rounded-3xl border border-zinc-800 flex justify-between items-center transform animate-fade-in">
                                    <div className="flex items-center gap-4">
                                        <span className="text-3xl">{p.token}</span>
                                        <span className="font-bold">{p.name}</span>
                                    </div>
                                    {p.isHost && <span className="text-[8px] bg-orange-500 px-3 py-1 rounded-full font-black uppercase">Host</span>}
                                </div>
                            ))}
                        </div>
                        {gameState?.players.find(p=>p.uid===user.uid)?.isHost && (
                            <button onClick={()=>window.FB.updateDoc(window.FB.doc(window.FB.db,"rooms",roomID),{status:'playing'})} className="w-full bg-white text-black py-5 rounded-[2rem] font-black text-xl hover:bg-orange-500 hover:text-white transition-all">MULAI MAIN!</button>
                        )}
                    </div>
                </div>
            );

            if (screen === 'game' && gameState) {
                const myIdx = gameState.players.findIndex(p => p.uid === user.uid);
                const isMyTurn = gameState.turn === myIdx;
                const visualPos = localPos[user.uid] || 0;
                const tile = TILES_DATA[visualPos];
                const properties = gameState.props || {};
                const owner = properties[visualPos]?.owner;

                return (
                    <div className="min-h-screen flex flex-col lg:flex-row p-2 md:p-6 gap-6 screen-fade">
                        <div className="flex-1 board-grid shadow-2xl rounded-xl">
                            {TILES_DATA.map((t, i) => {
                                const coord = getCoord(i);
                                const prop = properties[i];
                                return (
                                    <div key={i} className="tile" style={{ gridRow: coord.r, gridColumn: coord.c }}>
                                        {t.color && <div className="h-[20%] w-full" style={{ background: t.color }} />}
                                        <div className="flex-1 flex items-center justify-center p-0.5"><span className="leading-tight text-zinc-900 uppercase font-black">{t.name}</span></div>
                                        {prop && <div className="absolute top-1 right-1 w-2 h-2 rounded-full ring-1 ring-black/10" style={{ background: gameState.players.find(p=>p.uid===prop.owner)?.color }}></div>}
                                        {prop?.houses > 0 && <div className="house-indicator">{[...Array(prop.houses)].map((_,idx)=><div key={idx} className="house-dot"></div>)}</div>}
                                        <div className="absolute inset-0 flex items-center justify-center gap-0.5 pointer-events-none">
                                            {gameState.players.map(p => {
                                                const pPos = localPos[p.uid] || 0;
                                                if (pPos === i) return <div key={p.uid} className="w-6 h-6 rounded-full flex items-center justify-center border-2 border-white shadow-xl token" style={{ background: p.color }}>{p.token}</div>;
                                                return null;
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                            <div className="col-start-2 col-end-11 row-start-2 row-end-11 flex flex-col items-center justify-center opacity-5 pointer-events-none">
                                <h1 className="text-9xl font-black italic">PAPUA</h1>
                            </div>
                        </div>

                        <div className="w-full lg:w-96 space-y-4">
                            <div className="bg-zinc-900 p-8 rounded-[2.5rem] border border-zinc-800 shadow-2xl space-y-8">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-orange-500 font-black italic uppercase tracking-widest text-sm">Dashboard</h3>
                                    <div className={`px-4 py-1 rounded-full text-[10px] font-black tracking-widest ${isMyTurn?'bg-green-500 text-white animate-pulse':'bg-zinc-800 text-zinc-500'}`}>
                                        {isMyTurn ? 'GILIRAN ANDA' : 'MENUNGGU '+gameState.players[gameState.turn].name.toUpperCase()}
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    {gameState.players.map((p, idx) => (
                                        <div key={p.uid} className={`p-4 rounded-3xl flex justify-between items-center border transition-all ${gameState.turn===idx?'bg-zinc-800 border-orange-500 shadow-lg':'bg-zinc-900 border-zinc-800 opacity-40'}`}>
                                            <div className="flex items-center gap-4">
                                                <div className="w-10 h-10 rounded-full flex items-center justify-center text-xl shadow-inner" style={{ background: p.color }}>{p.token}</div>
                                                <span className="font-bold text-sm">{p.name}</span>
                                            </div>
                                            <span className="font-black text-green-500 text-sm">Rp{p.money.toLocaleString()}</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex gap-4">
                                    <div className="flex gap-3 bg-black p-4 rounded-3xl border border-zinc-800">
                                        <div className={`w-12 h-12 bg-white rounded-2xl text-black flex items-center justify-center text-2xl font-black shadow-inner ${isRolling?'rolling':''}`}>{gameState.dice[0]}</div>
                                        <div className={`w-12 h-12 bg-white rounded-2xl text-black flex items-center justify-center text-2xl font-black shadow-inner ${isRolling?'rolling':''}`}>{gameState.dice[1]}</div>
                                    </div>
                                    <button disabled={!isMyTurn || isRolling} onClick={rollDice} className="flex-1 bg-orange-600 rounded-3xl font-black text-xl shadow-xl transform active:scale-95 disabled:opacity-20 transition-all">KOCOK</button>
                                </div>
                                
                                {isMyTurn && !isRolling && (
                                    <div className="space-y-3 animate-fade-in">
                                        {!owner && ['prop','airport','port','util'].includes(tile.type) && (
                                            <button onClick={()=>handleAction('buy')} className="w-full bg-blue-600 py-5 rounded-[2rem] font-black text-sm uppercase tracking-widest shadow-lg transform hover:scale-105 transition-all">BELI {tile.name} (Rp{tile.price/1000}k)</button>
                                        )}
                                        {owner===user.uid && tile.type==='prop' && properties[visualPos].houses < 3 && (
                                            <button onClick={()=>handleAction('build')} className="w-full bg-green-600 py-5 rounded-[2rem] font-black text-sm uppercase tracking-widest shadow-lg transform hover:scale-105 transition-all">BANGUN HONAI (Rp{tile.build/1000}k)</button>
                                        )}
                                    </div>
                                )}
                            </div>
                            <div className="bg-zinc-900 p-6 rounded-[2rem] h-48 border border-zinc-800 overflow-hidden flex flex-col">
                                <span className="text-[10px] text-zinc-600 font-black uppercase mb-3">Log Ekspedisi</span>
                                <div className="flex-1 overflow-y-auto space-y-2 custom-scroll text-xs text-zinc-400">
                                    {gameState.logs.slice().reverse().map((log, i) => <div key={i} className="border-l-4 border-zinc-800 pl-4 py-1 leading-relaxed">{log}</div>)}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
