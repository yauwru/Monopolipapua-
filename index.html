<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Papua - Mobile Optimized</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #09090b; 
            color: white; 
            margin: 0; 
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            /* Optimasi ukuran agar muat di layar HP tanpa terpotong bar browser */
            width: min(95vw, 90vh);
            height: min(95vw, 90vh);
            position: relative;
        }

        .board-grid { 
            display: grid; 
            grid-template-columns: repeat(11, 1fr); 
            grid-template-rows: repeat(11, 1fr); 
            width: 100%; 
            height: 100%; 
            background: #18181b; 
            border: 4px solid #27272a; 
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
        }

        .tile { 
            border: 0.5px solid #d4d4d8; 
            position: relative; 
            background: #ffffff; 
            color: #18181b; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            /* Font responsif berdasarkan ukuran board */
            font-size: 1.2vmin; 
            font-weight: 800; 
            text-align: center;
        }

        .center-dash {
            grid-column: 2 / 11;
            grid-row: 2 / 11;
            background: #09090b;
            display: flex;
            flex-direction: column;
            padding: 2vmin;
            position: relative;
            border: 1.5px solid #27272a;
            overflow: hidden;
            background-image: radial-gradient(#27272a 0.5px, transparent 0.5px);
            background-size: 15px 15px;
        }

        .token { 
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); 
            z-index: 50; 
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
            width: 4vmin;
            height: 4vmin;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid white;
            font-size: 2.2vmin;
            position: absolute;
        }

        .house-dot {
            width: 1.2vmin;
            height: 1.2vmin;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 3px #22c55e;
        }

        @keyframes shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(8deg); } 75% { transform: rotate(-8deg); } }
        .rolling { animation: shake 0.1s infinite; }

        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
        
        .btn-papua { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); touch-action: manipulation; }
        
        .winner-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPSs5fJjfbWvFlYMjZqrG4eZAstvKsHgg",
            authDomain: "polipa-30a84.firebaseapp.com",
            projectId: "polipa-30a84",
            storageBucket: "polipa-30a84.firebasestorage.app",
            messagingSenderId: "305278736815",
            appId: "1:305278736815:web:133040b603d90e005c775a",
            measurementId: "G-YHN6TEBTGJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.FB = { auth, db, doc, setDoc, onSnapshot, updateDoc, getDoc, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TILES_DATA = [
            { name: "MULAI", type: "start", price: 0 },
            { name: "Pantai Base G", type: "prop", color: "#8b4513", price: 600000, rent: [40000, 200000, 600000, 1800000], build: 500000 },
            { name: "Suara Rakyat", type: "event" },
            { name: "Danau Sentani", type: "prop", color: "#8b4513", price: 600000, rent: [40000, 200000, 600000, 1800000], build: 500000 },
            { name: "Pajak Masuk", type: "tax", price: 2000000 },
            { name: "Bandara Sentani", type: "airport", price: 2000000 },
            { name: "Biak Kota", type: "prop", color: "#0ea5e9", price: 1000000, rent: [60000, 300000, 900000, 2500000], build: 500000 },
            { name: "Peluang", type: "event" },
            { name: "Supiori", type: "prop", color: "#0ea5e9", price: 1000000, rent: [60000, 300000, 900000, 2500000], build: 500000 },
            { name: "Kep. Yapen", type: "prop", color: "#0ea5e9", price: 1200000, rent: [80000, 400000, 1000000, 3000000], build: 500000 },
            { name: "PENJARA ADAT", type: "jail" },
            { name: "Wamena", type: "prop", color: "#d946ef", price: 1400000, rent: [100000, 500000, 1500000, 4000000], build: 1000000 },
            { name: "PLN", type: "util", price: 1500000 },
            { name: "Baliem", type: "prop", color: "#d946ef", price: 1400000, rent: [100000, 500000, 1500000, 4000000], build: 1000000 },
            { name: "Puncak Jaya", type: "prop", color: "#d946ef", price: 1600000, rent: [120000, 600000, 1800000, 5000000], build: 1000000 },
            { name: "Pelabuhan JPR", type: "port", price: 2000000 },
            { name: "Timika", type: "prop", color: "#f97316", price: 1800000, rent: [140000, 700000, 2000000, 5500000], build: 1000000 },
            { name: "Suara Rakyat", type: "event" },
            { name: "Tembagapura", type: "prop", color: "#f97316", price: 1800000, rent: [140000, 700000, 2000000, 5500000], build: 1000000 },
            { name: "Asmat", type: "prop", color: "#f97316", price: 2000000, rent: [160000, 800000, 2200000, 6000000], build: 1000000 },
            { name: "PARKIR BEBAS", type: "park" },
            { name: "Manokwari", type: "prop", color: "#ef4444", price: 2200000, rent: [180000, 900000, 2500000, 7000000], build: 1500000 },
            { name: "Peluang", type: "event" },
            { name: "Wondama", type: "prop", color: "#ef4444", price: 2200000, rent: [180000, 900000, 2500000, 7000000], build: 1500000 },
            { name: "Fakfak", type: "prop", color: "#ef4444", price: 2400000, rent: [200000, 1000000, 3000000, 7500000], build: 1500000 },
            { name: "Bandara Mopah", type: "airport", price: 2000000 },
            { name: "Merauke", type: "prop", color: "#eab308", price: 2600000, rent: [220000, 1100000, 3300000, 8000000], build: 1500000 },
            { name: "Boven Digoel", type: "prop", color: "#eab308", price: 2600000, rent: [220000, 1100000, 3300000, 8000000], build: 1500000 },
            { name: "PAM", type: "util", price: 1500000 },
            { name: "Tanah Merah", type: "prop", color: "#eab308", price: 2800000, rent: [240000, 1200000, 3600000, 8500000], build: 1500000 },
            { name: "MASUK PENJARA", type: "gotojail" },
            { name: "Sorong Kota", type: "prop", color: "#16a34a", price: 3000000, rent: [260000, 1300000, 3900000, 9000000], build: 2000000 },
            { name: "Raja Ampat 2", type: "prop", color: "#16a34a", price: 3000000, rent: [260000, 1300000, 3900000, 9000000], build: 2000000 },
            { name: "Suara Rakyat", type: "event" },
            { name: "Piaynemo", type: "prop", color: "#16a34a", price: 3200000, rent: [280000, 1500000, 4500000, 10000000], build: 2000000 },
            { name: "Pelabuhan SRG", type: "port", price: 2000000 },
            { name: "Peluang", type: "event" },
            { name: "Jayapura", type: "prop", color: "#2563eb", price: 3500000, rent: [350000, 1750000, 5000000, 11000000], build: 2000000 },
            { name: "Denda Adat", type: "tax", price: 3000000 },
            { name: "Puncak JPR", type: "prop", color: "#2563eb", price: 4000000, rent: [500000, 2000000, 6000000, 13000000], build: 2000000 }
        ];

        const TOKENS = ["🦜", "🐊", "🛶", "🐍", "🦘"];
        const EVENT_CARDS = [
            { text: "Bagi hasil mas kawin! +Rp1 Jt", pay: 1000000 },
            { text: "Denda tabrak babi! -Rp1,5 Jt", pay: -1500000 },
            { text: "Menang Lomba Molo! +Rp500 K", pay: 500000 },
            { text: "Salah jalan ke Penjara Adat!", goto: 10, jail: 3 },
            { text: "Kunjungan ke Jayapura!", goto: 39 },
            { text: "Bantuan Dana Kampung! +Rp2 Jt", pay: 2000000 }
        ];

        const formatGameMoney = (val) => {
            const absVal = Math.abs(val);
            let s = "";
            if (absVal >= 1000000) s = (absVal/1000000).toLocaleString('id-ID', {maximumFractionDigits:1}) + " Jt";
            else if (absVal >= 1000) s = (absVal/1000).toLocaleString('id-ID') + " K";
            else s = absVal.toString();
            return (val < 0 ? "-" : "") + "Rp" + s;
        }

        function App() {
            const [user, setUser] = useState(null);
            const [roomID, setRoomID] = useState("");
            const [playerName, setPlayerName] = useState("");
            const [gameState, setGameState] = useState(null);
            const [screen, setScreen] = useState('landing');
            const [isRolling, setIsRolling] = useState(false);
            const [selectedToken, setSelectedToken] = useState(TOKENS[0]);
            const [localPos, setLocalPos] = useState({});

            const getTileStyle = (i) => {
                const c = [[11,11],[11,10],[11,9],[11,8],[11,7],[11,6],[11,5],[11,4],[11,3],[11,2],[11,1],[10,1],[9,1],[8,1],[7,1],[6,1],[5,1],[4,1],[3,1],[2,1],[1,1],[1,2],[1,3],[1,4],[1,5],[1,6],[1,7],[1,8],[1,9],[1,10],[1,11],[2,11],[3,11],[4,11],[5,11],[6,11],[7,11],[8,11],[9,11],[10,11]];
                return { gridRow: c[i][0], gridColumn: c[i][1] };
            };

            useEffect(() => {
                window.FB.onAuthStateChanged(window.FB.auth, u => {
                    if (u) setUser(u);
                    else window.FB.signInAnonymously(window.FB.auth);
                });
            }, []);

            useEffect(() => {
                if (!roomID || !user) return;
                return window.FB.onSnapshot(window.FB.doc(window.FB.db, "rooms", roomID), snap => {
                    if (snap.exists()) {
                        const data = snap.data();
                        setGameState(data);
                        if (data.status === 'playing') setScreen('game');
                        const pMap = {};
                        data.players.forEach(p => pMap[p.uid] = p.pos);
                        setLocalPos(pMap);
                    }
                });
            }, [roomID, user]);

            const joinGame = async (role) => {
                if (!playerName) return alert("Siapa nama?");
                const id = role === 'host' ? "P-" + Math.floor(1000 + Math.random() * 9000) : roomID;
                if (!id) return alert("Isi Kode!");

                const docRef = window.FB.doc(window.FB.db, "rooms", id);
                const snap = await window.FB.getDoc(docRef);
                let data = snap.exists() ? snap.data() : { players: [], status: 'waiting', turn: 0, dice: [1,1], logs: ["Sio mama, mari main!"], props: {}, utilRates: { pln: 0, pam: 0 } };
                
                if (data.players.length >= 4) return alert("Penuh!");
                if (!data.players.find(p => p.uid === user.uid)) {
                    data.players.push({ uid: user.uid, name: playerName, token: selectedToken, money: 15000000, pos: 0, color: `hsl(${Math.random()*360}, 70%, 55%)`, isHost: role === 'host', inJail: 0, isBankrupt: false });
                    data.logs.push(`${playerName} masuk.`);
                }
                setRoomID(id);
                await window.FB.setDoc(docRef, data);
                setScreen('lobby');
            };

            const rollDice = async () => {
                if (isRolling) return;
                const myIdx = gameState.players.findIndex(p => p.uid === user.uid);
                if (gameState.turn !== myIdx || gameState.players[myIdx].isBankrupt) return;

                setIsRolling(true);
                const d1 = Math.floor(Math.random()*6)+1;
                const d2 = Math.floor(Math.random()*6)+1;
                const total = d1 + d2;

                let steps = 0;
                const anim = setInterval(() => {
                    setLocalPos(prev => ({ ...prev, [user.uid]: (prev[user.uid] + 1) % 40 }));
                    steps++;
                    if (steps >= total) {
                        clearInterval(anim);
                        finishTurn(d1, d2, total);
                    }
                }, 150);
            };

            const finishTurn = async (d1, d2, total) => {
                const myIdx = gameState.players.findIndex(p => p.uid === user.uid);
                let players = [...gameState.players];
                let props = { ...gameState.props };
                let logs = [...gameState.logs].slice(-10);
                let p = players[myIdx];

                if (p.inJail > 0) {
                    if (d1 === d2) { p.inJail = 0; logs.push(`${p.name} bebas!`); }
                    else { p.inJail--; logs.push(`${p.name} skip giliran.`); }
                } else {
                    const oldPos = p.pos;
                    p.pos = (p.pos + total) % 40;
                    if (p.pos < oldPos) { p.money += 2000000; logs.push(`${p.name} lewat MULAI: +Rp2 Jt`); }

                    const tile = TILES_DATA[p.pos];
                    logs.push(`${p.name} tiba di ${tile.name}`);

                    if (tile.type === 'event') {
                        const card = EVENT_CARDS[Math.floor(Math.random()*EVENT_CARDS.length)];
                        logs.push(`Kartu: ${card.text}`);
                        if (card.pay) p.money += card.pay;
                        if (card.goto !== undefined) p.pos = card.goto;
                        if (card.jail) p.inJail = card.jail;
                    }

                    if (tile.type === 'tax') { p.money -= tile.price; logs.push(`Bayar Pajak ${formatGameMoney(tile.price)}`); }
                    if (tile.type === 'gotojail') { p.pos = 10; p.inJail = 3; logs.push(`${p.name} ke Penjara!`); }

                    const currentProp = props[p.pos];
                    if (currentProp && currentProp.owner !== user.uid) {
                        const ownerIdx = players.findIndex(pl => pl.uid === currentProp.owner);
                        const rent = tile.type === 'prop' ? tile.rent[currentProp.houses] : 500000;
                        p.money -= rent;
                        players[ownerIdx].money += rent;
                        logs.push(`Sewa ke ${players[ownerIdx].name}`);
                    }
                }

                if (p.money <= 0) { p.isBankrupt = true; p.money = 0; logs.push(`🚨 ${p.name} BANGKRUT!`); }

                let nextTurn = (gameState.turn + 1) % players.length;
                while (players[nextTurn].isBankrupt) nextTurn = (nextTurn + 1) % players.length;

                await window.FB.updateDoc(window.FB.doc(window.FB.db, "rooms", roomID), { dice: [d1,d2], players, logs, turn: nextTurn });
                setIsRolling(false);
            };

            const manageProp = async (type) => {
                const myIdx = gameState.players.findIndex(p => p.uid === user.uid);
                let players = [...gameState.players];
                let props = { ...gameState.props };
                const pos = players[myIdx].pos;
                const tile = TILES_DATA[pos];

                if (type === 'buy' && players[myIdx].money >= tile.price) {
                    players[myIdx].money -= tile.price;
                    props[pos] = { owner: user.uid, houses: 0 };
                    await window.FB.updateDoc(window.FB.doc(window.FB.db, "rooms", roomID), { players, props, logs: [...gameState.logs, `${playerName} beli ${tile.name}`] });
                } else if (type === 'build' && props[pos]?.owner === user.uid && players[myIdx].money >= tile.build && props[pos].houses < 3) {
                    players[myIdx].money -= tile.build;
                    props[pos].houses += 1;
                    await window.FB.updateDoc(window.FB.doc(window.FB.db, "rooms", roomID), { players, props, logs: [...gameState.logs, `${playerName} bangun Honai`] });
                }
            };

            const winner = useMemo(() => {
                if (!gameState || gameState.status !== 'playing') return null;
                const active = gameState.players.filter(p => !p.isBankrupt);
                return active.length === 1 && gameState.players.length > 1 ? active[0] : null;
            }, [gameState]);

            if (screen === 'landing') return (
                <div className="flex flex-col items-center justify-center space-y-6 text-center">
                    <h1 className="text-6xl font-black text-orange-500 italic tracking-tighter mb-4">PAPUA</h1>
                    <div className="w-72 space-y-4">
                        <input className="w-full bg-zinc-900 p-4 rounded-2xl border border-zinc-800 text-center" placeholder="Nama PACE / MACE" value={playerName} onChange={e=>setPlayerName(e.target.value)} />
                        <div className="flex justify-around bg-zinc-900 p-2 rounded-2xl border border-zinc-800">
                            {TOKENS.map(t => <button key={t} onClick={()=>setSelectedToken(t)} className={`text-3xl p-1 rounded-xl transition-all ${selectedToken===t?'bg-orange-600 scale-110 shadow-lg':'opacity-20'}`}>{t}</button>)}
                        </div>
                        <div className="flex gap-3">
                            <button onClick={()=>joinGame('host')} className="flex-1 btn-papua py-4 rounded-2xl font-black text-lg text-white">HOST</button>
                            <button onClick={()=>setScreen('join')} className="flex-1 bg-zinc-800 py-4 rounded-2xl font-black text-lg">GABUNG</button>
                        </div>
                    </div>
                </div>
            );

            if (screen === 'join') return (
                <div className="bg-zinc-900 p-8 rounded-[3rem] w-72 text-center space-y-6 border border-zinc-800 shadow-2xl">
                    <h2 className="text-zinc-500 font-bold uppercase text-[10px] tracking-widest text-white">KODE ROOM</h2>
                    <input className="w-full bg-zinc-800 p-4 rounded-xl text-3xl font-black text-center border border-zinc-700 outline-none" placeholder="P-XXXX" value={roomID} onChange={e=>setRoomID(e.target.value.toUpperCase())} />
                    <button onClick={()=>joinGame('client')} className="w-full btn-papua py-4 rounded-xl font-black text-white">GABUNG</button>
                    <button onClick={()=>setScreen('landing')} className="text-zinc-500 text-xs font-bold block mx-auto">Batal</button>
                </div>
            );

            if (screen === 'lobby') return (
                <div className="bg-zinc-900 p-8 rounded-[3rem] w-80 space-y-6 border border-zinc-800">
                    <div className="text-center">
                        <p className="text-[10px] text-zinc-500 font-bold">KODE RUANGAN</p>
                        <p className="text-5xl font-black text-orange-500">{roomID}</p>
                    </div>
                    <div className="space-y-2">
                        {gameState?.players.map(p => (
                            <div key={p.uid} className="bg-zinc-800 p-4 rounded-2xl flex justify-between items-center border border-zinc-800">
                                <span className="font-bold text-lg">{p.token} {p.name}</span>
                                {p.isHost && <span className="text-[8px] bg-orange-500 px-2 py-1 rounded-full font-black uppercase">Host</span>}
                            </div>
                        ))}
                    </div>
                    {gameState?.players.find(p=>p.uid===user.uid)?.isHost && (
                        <button onClick={()=>window.FB.updateDoc(window.FB.doc(window.FB.db,"rooms",roomID),{status:'playing'})} className="w-full bg-white text-black py-4 rounded-2xl font-black uppercase">Mulai!</button>
                    )}
                </div>
            );

            if (screen === 'game' && gameState) {
                const myIdx = gameState.players.findIndex(p => p.uid === user.uid);
                const isMyTurn = gameState.turn === myIdx;
                const vPos = localPos[user.uid] || 0;
                const tile = TILES_DATA[vPos];
                const props = gameState.props || {};
                const ownerUid = props[vPos]?.owner;

                return (
                    <div className="game-wrapper">
                        {winner && (
                            <div className="winner-overlay">
                                <h1 className="text-5xl font-black text-orange-500 mb-2 italic">MENANG!</h1>
                                <div className="text-8xl mb-4">{winner.token}</div>
                                <h2 className="text-3xl font-black text-white">{winner.name}</h2>
                                <button onClick={()=>window.location.reload()} className="mt-8 bg-white text-black px-10 py-4 rounded-2xl font-black">MAIN LAGI</button>
                            </div>
                        )}

                        <div className="board-grid">
                            {TILES_DATA.map((t, i) => (
                                <div key={i} className="tile" style={getTileStyle(i)}>
                                    {t.color && <div className="h-[25%] w-full" style={{ background: t.color }} />}
                                    <div className="flex-1 flex flex-col items-center justify-center p-0.5 uppercase leading-none font-black">
                                        <span className="mb-0.5">{t.name}</span>
                                        {t.price > 0 && <span className="text-orange-600 text-[0.4rem]">{formatGameMoney(t.price)}</span>}
                                    </div>
                                    {props[i] && <div className="absolute top-0.5 right-0.5 w-2 h-2 rounded-full" style={{ background: gameState.players.find(p=>p.uid===props[i].owner)?.color }}></div>}
                                    {props[i]?.houses > 0 && <div className="absolute top-[22%] w-full flex justify-center gap-0.5">{[...Array(props[i].houses)].map((_,idx)=><div key={idx} className="house-dot"></div>)}</div>}
                                </div>
                            ))}

                            <div className="center-dash">
                                <div className="flex-1 flex flex-col items-center justify-between">
                                    {/* Stats HUD (Lebih ramping) */}
                                    <div className="grid grid-cols-2 gap-1.5 w-full">
                                        {gameState.players.map((p, idx) => (
                                            <div key={p.uid} className={`p-2 rounded-2xl border transition-all ${p.isBankrupt?'opacity-10 grayscale':(gameState.turn===idx?'bg-zinc-800 border-orange-500 ring-2 ring-orange-500/20':'bg-zinc-950 border-zinc-900 opacity-40')} flex items-center gap-2 overflow-hidden`}>
                                                <span className="text-xl">{p.token}</span>
                                                <div className="flex flex-col truncate">
                                                    <span className="text-[0.5rem] font-bold text-zinc-500 uppercase truncate">{p.name}</span>
                                                    <span className="text-[0.65rem] font-black text-green-500">{formatGameMoney(p.money)}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* Action Box */}
                                    <div className="w-full bg-zinc-900/60 rounded-[2rem] p-4 border border-zinc-800 flex flex-col items-center space-y-3">
                                        <div className="flex gap-4">
                                            <div className={`w-12 h-12 bg-white rounded-xl text-black flex items-center justify-center text-3xl font-black shadow-lg ${isRolling?'rolling':''}`}>{gameState.dice[0]}</div>
                                            <div className={`w-12 h-12 bg-white rounded-xl text-black flex items-center justify-center text-3xl font-black shadow-lg ${isRolling?'rolling':''}`}>{gameState.dice[1]}</div>
                                        </div>
                                        
                                        {isMyTurn && !isRolling && !gameState.players[myIdx].isBankrupt ? (
                                            <div className="w-full flex flex-col gap-2">
                                                <button onClick={rollDice} className="w-full btn-papua py-3 rounded-2xl font-black text-base shadow-xl text-white uppercase">Kocok Dadu</button>
                                                <div className="flex gap-2">
                                                    {!ownerUid && ['prop','airport','port','util'].includes(tile.type) && (
                                                        <button onClick={()=>manageProp('buy')} className="flex-1 bg-blue-600 py-2.5 rounded-xl font-black text-[0.5rem] uppercase text-white">Beli {tile.name}</button>
                                                    )}
                                                    {ownerUid===user.uid && tile.type==='prop' && props[vPos].houses < 3 && (
                                                        <button onClick={()=>manageProp('build')} className="flex-1 bg-green-600 py-2.5 rounded-xl font-black text-[0.5rem] uppercase text-white">Bangun Honai</button>
                                                    )}
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="text-center py-2">
                                                <p className="text-[0.5rem] font-black text-zinc-600 uppercase tracking-widest mb-1">Giliran</p>
                                                <p className="text-lg font-black text-white italic truncate w-32 uppercase">{gameState.players[gameState.turn].name}</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* Mini Log */}
                                    <div className="w-full h-16 bg-zinc-950/60 p-2 rounded-xl border border-zinc-900 overflow-hidden">
                                        <div className="flex-1 overflow-y-auto custom-scroll h-full">
                                            {gameState.logs.slice().reverse().map((log, i) => <div key={i} className="text-[0.45rem] text-zinc-500 border-l-2 border-zinc-800 pl-2 mb-1">{log}</div>)}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Token Layer */}
                            {gameState.players.map((p, idx) => !p.isBankrupt && (
                                <div key={p.uid} className="token shadow-xl" style={{ 
                                    background: p.color, 
                                    gridRow: getTileStyle(localPos[p.uid] || 0).gridRow, 
                                    gridColumn: getTileStyle(localPos[p.uid] || 0).gridColumn,
                                    transform: `translate(${(idx*8)-12}%, ${(idx*8)-12}%)` 
                                }}>
                                    {p.token}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }
            return <div className="font-black text-orange-500 text-3xl animate-pulse">PAPUA...</div>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
